<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Farooq & Naazra | Royal Wedding Invitation</title>
  <!-- Google Fonts: Cinzel & Montserrat -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Tailwind + custom styles are compiled below -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- html2canvas for download invitation as image -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <!-- React & ReactDOM CDN (for simplicity without build step) - but we also embed React components using JSX via Babel? 
       To provide a fully self-contained working zip with React + Tailwind without node_modules? But requirement says "use react and tailwind", 
       the best is to deliver a full Vite/React project, but user expects single HTML? Actually we can create a single HTML using React via CDN + Babel standalone. 
       This ensures easy deploy on GitHub Pages without build step. However, we also need "downloadable invitation" and full interactivity. 
       I will produce a high-quality single HTML file that uses React, ReactDOM, Babel, and Tailwind CDN. It's easier to deploy and meets the requirement of React + Tailwind.
       No build step needed. I'll write full HTML with embedded React components. -->
  <style>
    /* Custom gold shimmer and additional animations */
    @keyframes shimmerPulse {
      0% { opacity: 0.7; text-shadow: 0 0 5px rgba(212,175,55,0.3);}
      50% { opacity: 1; text-shadow: 0 0 25px rgba(212,175,55,0.8);}
      100% { opacity: 0.7; text-shadow: 0 0 5px rgba(212,175,55,0.3);}
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-up {
      animation: fadeInUp 0.7s ease forwards;
    }
    .scratch-canvas {
      touch-action: none;
    }
    .gold-border-glow {
      box-shadow: 0 0 12px rgba(212,175,55,0.4);
    }
    .digital-card {
      transition: transform 0.3s ease, box-shadow 0.3s;
    }
    .digital-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 25px 35px -12px rgba(0,0,0,0.5), 0 0 0 1px rgba(212,175,55,0.5);
    }
    .bg-blue-rose-pattern {
      background-image: radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.08) 2%, transparent 2.5%),
                        radial-gradient(circle at 80% 70%, rgba(37, 99, 235, 0.08) 1.8%, transparent 2%);
      background-size: 40px 40px, 35px 35px;
    }
  </style>
</head>
<body class="bg-black text-white font-montserrat overflow-x-hidden">
  <div id="root"></div>

  <!-- Load React, ReactDOM, Babel -->
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    // Main React App with Tailwind CSS
    const { useState, useEffect, useRef, useCallback } = React;

    // Loader Component
    const Loader = ({ onComplete }) => {
      useEffect(() => {
        const timer = setTimeout(() => {
          onComplete();
        }, 2200);
        return () => clearTimeout(timer);
      }, [onComplete]);
      return (
        <div className="fixed inset-0 z-[100] bg-black flex flex-col items-center justify-center transition-opacity duration-1000">
          <div className="text-center animate-pulse">
            <div className="font-cinzel text-5xl md:text-7xl tracking-wider bg-gradient-to-r from-amber-400 via-yellow-300 to-amber-600 bg-clip-text text-transparent mb-4">
              F & N
            </div>
            <div className="font-cinzel text-2xl md:text-3xl bg-gradient-to-r from-amber-300 to-yellow-500 bg-clip-text text-transparent">
              بِسْمِ اللَّهِ
            </div>
            <div className="font-cinzel text-base md:text-lg text-amber-400/80 mt-2">Bismillah</div>
          </div>
        </div>
      );
    };

    // Hero Section
    const Hero = () => (
      <div className="text-center py-12 md:py-20 px-4">
        <div className="font-cinzel text-5xl md:text-7xl lg:text-8xl font-bold bg-gradient-to-r from-amber-400 via-yellow-300 to-amber-500 bg-clip-text text-transparent leading-tight">
          Farooq Ahmad
        </div>
        <div className="font-cinzel text-3xl md:text-5xl text-amber-400/80 my-2">&</div>
        <div className="font-cinzel text-5xl md:text-7xl lg:text-8xl font-bold bg-gradient-to-r from-amber-400 via-yellow-300 to-amber-500 bg-clip-text text-transparent leading-tight">
          Naazra Khatoon
        </div>
        <div className="mt-6 text-amber-300/80 tracking-widest text-sm md:text-base border-t border-b border-amber-500/30 inline-block py-2 px-6 backdrop-blur-sm">
          Request the honour of your presence
        </div>
      </div>
    );

    // Scratch Card Component (reveal date 9 May 2026)
    const ScratchCard = () => {
      const canvasRef = useRef(null);
      const containerRef = useRef(null);
      const [isRevealed, setIsRevealed] = useState(false);
      const [drawing, setDrawing] = useState(false);

      const initCanvas = useCallback(() => {
        const canvas = canvasRef.current;
        const container = containerRef.current;
        if (!canvas || !container) return;
        const rect = container.getBoundingClientRect();
        const width = rect.width;
        const height = rect.height;
        canvas.width = width;
        canvas.height = height;
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        const ctx = canvas.getContext('2d');
        // Draw golden scratch layer
        const grad = ctx.createLinearGradient(0, 0, width, height);
        grad.addColorStop(0, '#b8860b');
        grad.addColorStop(0.4, '#eab308');
        grad.addColorStop(0.7, '#d4af37');
        grad.addColorStop(1, '#fde047');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, width, height);
        // add sparkle effect
        for (let i = 0; i < 200; i++) {
          ctx.fillStyle = `rgba(255,245,180,${Math.random() * 0.6})`;
          ctx.beginPath();
          ctx.arc(Math.random() * width, Math.random() * height, Math.random() * 2 + 1, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.strokeStyle = '#facc15';
        ctx.lineWidth = 1.5;
        for (let i = 0; i < 15; i++) {
          ctx.beginPath();
          ctx.moveTo(i * 35, 0);
          ctx.lineTo(i * 35 + 20, height);
          ctx.stroke();
        }
      }, []);

      useEffect(() => {
        initCanvas();
        window.addEventListener('resize', initCanvas);
        return () => window.removeEventListener('resize', initCanvas);
      }, [initCanvas]);

      const getCoordinates = (e) => {
        const canvas = canvasRef.current;
        if (!canvas) return null;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) {
          clientX = e.touches[0].clientX;
          clientY = e.touches[0].clientY;
        } else {
          clientX = e.clientX;
          clientY = e.clientY;
        }
        let x = (clientX - rect.left) * scaleX;
        let y = (clientY - rect.top) * scaleY;
        x = Math.min(Math.max(0, x), canvas.width);
        y = Math.min(Math.max(0, y), canvas.height);
        return { x, y };
      };

      const scratch = (x, y, isStart) => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        ctx.globalCompositeOperation = 'destination-out';
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = 28;
        if (isStart) {
          ctx.beginPath();
          ctx.arc(x, y, 14, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.lineTo(x, y);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(x, y, 14, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.stroke();
        ctx.beginPath();
        ctx.globalCompositeOperation = 'source-over';
        // check if revealed enough (optional but we set revealed state when major area scratched, but just by interaction)
        if (!isRevealed) setIsRevealed(true);
      };

      const handleStart = (e) => {
        e.preventDefault();
        setDrawing(true);
        const coords = getCoordinates(e);
        if (coords) scratch(coords.x, coords.y, true);
      };
      const handleMove = (e) => {
        if (!drawing) return;
        e.preventDefault();
        const coords = getCoordinates(e);
        if (coords) scratch(coords.x, coords.y, false);
      };
      const handleEnd = () => setDrawing(false);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        canvas.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('touchstart', handleStart);
        canvas.addEventListener('touchmove', handleMove);
        canvas.addEventListener('touchend', handleEnd);
        return () => {
          canvas.removeEventListener('mousedown', handleStart);
          window.removeEventListener('mousemove', handleMove);
          window.removeEventListener('mouseup', handleEnd);
          canvas.removeEventListener('touchstart', handleStart);
          canvas.removeEventListener('touchmove', handleMove);
          canvas.removeEventListener('touchend', handleEnd);
        };
      }, [drawing]);

      return (
        <div className="flex flex-col items-center gap-5 my-8">
          <div ref={containerRef} className="relative w-80 md:w-96 h-48 rounded-2xl shadow-2xl border border-amber-500/50 overflow-hidden">
            <div className="absolute inset-0 flex items-center justify-center z-0 bg-black/20 backdrop-blur-sm rounded-2xl">
              <span className="font-cinzel text-3xl md:text-4xl font-bold text-amber-400 bg-black/50 px-4 py-1 rounded-full">
                {isRevealed ? "✨ 9 MAY 2026 ✨" : "????"}
              </span>
            </div>
            <canvas ref={canvasRef} className="absolute top-0 left-0 w-full h-full cursor-grab active:cursor-grabbing z-10 scratch-canvas" />
          </div>
          <div className="text-amber-400/80 text-xs md:text-sm bg-black/60 px-4 py-1 rounded-full border border-amber-500/40">
            🖌️ Scratch the golden surface to reveal the wedding date
          </div>
        </div>
      );
    };

    // Invitation Generator with Download & dynamic name
    const InvitationGenerator = () => {
      const [guestName, setGuestName] = useState("");
      const [generatedCard, setGeneratedCard] = useState(null);
      const cardRef = useRef(null);

      const generateInvitation = () => {
        let name = guestName.trim();
        if (name === "") name = "Beloved Guest";
        setGeneratedCard(name);
      };

      const downloadAsImage = async () => {
        if (!cardRef.current) return;
        try {
          const canvas = await html2canvas(cardRef.current, { scale: 2, backgroundColor: '#0a0a0a' });
          const link = document.createElement('a');
          link.download = `invitation_${guestName.replace(/\s/g, '_') || 'guest'}.png`;
          link.href = canvas.toDataURL();
          link.click();
        } catch (err) {
          alert("Could not download. Please try again.");
        }
      };

      return (
        <div className="bg-black/60 backdrop-blur-sm rounded-3xl p-6 md:p-8 border border-amber-500/40 shadow-xl">
          <div className="flex flex-col md:flex-row gap-5 items-center justify-center mb-8">
            <input 
              type="text"
              value={guestName}
              onChange={(e) => setGuestName(e.target.value)}
              placeholder="Enter your name, e.g., Mr. & Mrs. Kapoor"
              className="w-full md:w-80 bg-neutral-900 border border-amber-500/60 rounded-full px-6 py-3 text-white font-montserrat focus:outline-none focus:ring-2 focus:ring-amber-400 transition"
            />
            <button onClick={generateInvitation} className="bg-gradient-to-r from-amber-600 to-yellow-500 hover:from-amber-500 hover:to-yellow-400 text-black font-cinzel font-bold py-3 px-8 rounded-full shadow-lg transition transform hover:scale-105">
              ✨ Generate Invitation ✨
            </button>
          </div>
          {generatedCard && (
            <div className="flex flex-col items-center gap-6">
              <div ref={cardRef} className="digital-card w-full max-w-lg bg-gradient-to-br from-neutral-900 to-black border-2 border-amber-500 rounded-2xl p-6 relative overflow-hidden bg-blue-rose-pattern">
                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-amber-400 to-transparent"></div>
                <div className="text-center">
                  <div className="font-cinzel text-2xl text-amber-400 tracking-wide">— WEDDING INVITATION —</div>
                  <div className="border-t border-b border-amber-500/50 my-4 py-2">
                    <div className="font-cinzel text-xl text-amber-300">Farooq Ahmad & Naazra Khatoon</div>
                  </div>
                  <div className="font-montserrat text-amber-200/90 text-sm">Request the pleasure of your company at their wedding ceremony</div>
                  <div className="my-3 text-yellow-400 font-cinzel text-lg">✨ 9th May, 2026 | 7:00 PM ✨</div>
                  <div className="bg-amber-900/30 rounded-xl p-3 my-2">
                    <div className="font-cinzel text-amber-300 text-2xl break-words">✨ {generatedCard} ✨</div>
                    <div className="text-xs text-amber-400/70 mt-1">You are cordially invited</div>
                  </div>
                  <div className="mt-3 text-amber-400/80 text-sm">Venue: The Royal Garden, Bigahna, Hamirpur<br />Reception & Dinner</div>
                  <div className="mt-2 text-amber-500 text-xs border-t border-amber-500/30 pt-2">Blue Rose Ceremony | Traditional Blessings</div>
                </div>
                <div className="absolute bottom-2 right-3 opacity-30 text-amber-400 text-xs">F&N</div>
              </div>
              <button onClick={downloadAsImage} className="flex items-center gap-2 bg-black border border-amber-500 text-amber-400 px-6 py-2 rounded-full hover:bg-amber-900/30 transition font-montserrat font-semibold">
                📸 Download Invitation as Image
              </button>
            </div>
          )}
        </div>
      );
    };

    // Ceremony Details + Guest House Location & Timing
    const EventDetails = () => (
      <div className="grid md:grid-cols-2 gap-6 my-10">
        <div className="bg-black/40 border border-amber-500/30 rounded-2xl p-6 backdrop-blur-sm text-center">
          <div className="font-cinzel text-2xl text-amber-400 mb-3">💒 Wedding Ceremony</div>
          <div className="text-amber-200 text-lg">📅 9 May 2026 (Saturday)</div>
          <div className="text-amber-200/90 mt-2">⏰ 8:00 PM - 10:30 PM</div>
          <div className="text-amber-200/80 mt-1">📍 Venue: Royal Lawn, Bigahna, Maudaha, Hamirpur</div>
          <div className="mt-3 text-amber-400/70 text-sm">Followed by grand dinner & blessings</div>
        </div>
        <div className="bg-black/40 border border-amber-500/30 rounded-2xl p-6 backdrop-blur-sm text-center">
          <div className="font-cinzel text-2xl text-amber-400 mb-3">🏨 Guest House & Accommodation</div>
          <div className="text-amber-200 text-lg">Maqbool Palace Guest Wing</div>
          <div className="text-amber-200/80 mt-2">📍 Bigahna Main Road, Maudaha, Hamirpur (Adjacent to venue)</div>
          <div className="text-amber-400/70 text-sm mt-2">Complimentary stay for outstation guests | Check-in: 5 May 2026</div>
          <div className="text-amber-500/80 text-xs mt-3">For assistance contact: +91 98765 43210</div>
        </div>
      </div>
    );

    // Footer Component
    const Footer = () => (
      <footer className="text-center py-8 border-t border-amber-500/30 mt-10">
        <div className="font-cinzel text-amber-400 text-sm">Hosted by Maqbool Ahmad</div>
        <div className="text-amber-500/80 text-xs mt-1">📍 Bigahna, Maudaha, Hamirpur, Uttar Pradesh</div>
        <div className="text-amber-600/50 text-[11px] mt-3">✨ Eternal Blessings & Joy ✨</div>
      </footer>
    );

    // Main App with Intersection Observer animations
    const App = () => {
      const [loading, setLoading] = useState(true);
      const sectionsRef = useRef([]);

      useEffect(() => {
        if (!loading) {
          const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
              if (entry.isIntersecting) {
                entry.target.classList.add('animate-fade-up');
                observer.unobserve(entry.target);
              }
            });
          }, { threshold: 0.2 });
          sectionsRef.current.forEach(section => {
            if (section) observer.observe(section);
          });
          return () => observer.disconnect();
        }
      }, [loading]);

      const addToRefs = (el) => {
        if (el && !sectionsRef.current.includes(el)) sectionsRef.current.push(el);
      };

      if (loading) return <Loader onComplete={() => setLoading(false)} />;
      return (
        <div className="bg-black min-h-screen">
          <div className="container mx-auto px-4 md:px-8 max-w-6xl">
            <div ref={addToRefs} className="opacity-0 translate-y-8 transition-all duration-700"><Hero /></div>
            
            <div ref={addToRefs} className="opacity-0 translate-y-8 transition-all duration-700 my-8">
              <h2 className="font-cinzel text-3xl md:text-4xl text-center text-amber-400 mb-2">Save the Date</h2>
              <ScratchCard />
            </div>

            <div ref={addToRefs} className="opacity-0 translate-y-8 transition-all duration-700 my-12">
              <h2 className="font-cinzel text-3xl md:text-4xl text-center text-amber-400 mb-6">Your Personal Invitation</h2>
              <InvitationGenerator />
            </div>

            <div ref={addToRefs} className="opacity-0 translate-y-8 transition-all duration-700 my-12">
              <h2 className="font-cinzel text-3xl md:text-4xl text-center text-amber-400 mb-6">Ceremony & Hospitality</h2>
              <EventDetails />
            </div>

            <div ref={addToRefs} className="opacity-0 translate-y-8 transition-all duration-700">
              <Footer />
            </div>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
